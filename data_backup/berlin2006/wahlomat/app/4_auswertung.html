			function tableruler(){
				if (document.getElementById && document.createTextNode){
					var tables=document.getElementsByTagName('div');
					for (var i=0;i<tables.length;i++){
						if(tables[i].id=='result_table'){
							var trs=tables[i].getElementsByTagName('div');
							for(var j=0;j<trs.length;j++){
								trs[j].onmouseover=function(){this.id='result_bgcolchange';return false}
								trs[j].onmouseout=function(){this.id='';return false}
							}

					}
				}
